[loggers]
keys=root,oncx-core

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=jsonFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_oncx-core]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=oncx-core
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=jsonFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=jsonFormatter
args=('./logs/oncx-core.log', 'midnight', 1, 7, 'utf-8')

[formatter_jsonFormatter]
class=oncx_core.logger.json_formatter.JsonFormatter
